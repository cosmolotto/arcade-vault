<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ASTEROID STORM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Orbitron',monospace;touch-action:none}
canvas{display:block;max-width:100vw;max-height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=C.width=Math.min(window.innerWidth,520);
const H=C.height=Math.min(window.innerHeight,720);

// Audio
const AC=new AudioContext();
const snd=(f,d,t='sine',v=.2)=>{
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d);
};
const shootSnd=()=>snd(900,.08,'square',.12);
const explodeSnd=(sz)=>snd(40+sz*8,.4,'sawtooth',.4);
const powerSnd=()=>snd(660,.25,'sine',.3);
const dieSnd=()=>{snd(100,.8,'sawtooth',.5);snd(60,1,'sawtooth',.4);};

// State
let STATE='start',score=0,best=+localStorage.getItem('as_b')||0;
let lives=3,wave=1,waveTimer=0,combo=0,comboTimer=0;
let ship,bullets=[],asteroids=[],parts=[],powerups=[],stars=[];
let keys={},last=0,shakeT=0,iTimer=0;
// Touch
let touchX=null;

const mkStars=()=>{stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.8+.2,z:Math.random()*2+.5,b:Math.random()});};

function mkShip(){ship={x:W/2,y:H*.82,w:22,h:28,vx:0,inv:false,shield:0,rapid:0,shooting:0};}

function mkAsteroid(x,y,sz,vx,vy){
  const pts=[];const n=7+Math.floor(Math.random()*5);
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2,r=sz*(.7+Math.random()*.6);pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});}
  return{x,y,vx,vy,sz,pts,rot:0,rotV:(Math.random()-.5)*.06,hp:Math.max(1,Math.floor(sz/14))};
}

function spawnWave(){
  const n=3+wave*2;
  for(let i=0;i<n;i++){
    const sz=20+Math.random()*25;
    const x=Math.random()*W;
    const vy=.8+Math.random()*1.2+wave*.12;
    const vx=(Math.random()-.5)*1.5;
    asteroids.push(mkAsteroid(x,-sz,vx,vy,sz));
  }
}

function burst(x,y,n,cols,sp=4){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*sp+.5;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,dec:Math.random()*.04+.015,r:Math.random()*3+.5,col:cols[Math.floor(Math.random()*cols.length)]});
  }
}

function reset(){
  STATE='play';score=0;lives=3;wave=1;combo=0;comboTimer=0;waveTimer=0;
  bullets=[];asteroids=[];parts=[];powerups=[];
  mkShip();spawnWave();
}

function shoot(){
  const rapid=ship.rapid>0;
  if(rapid){
    bullets.push({x:ship.x-8,y:ship.y,vy:-12,w:2,h:12,col:'#ff6600'});
    bullets.push({x:ship.x+8,y:ship.y,vy:-12,w:2,h:12,col:'#ff6600'});
    bullets.push({x:ship.x,y:ship.y-6,vy:-13,w:2,h:14,col:'#ffaa00'});
    shootSnd();
  } else {
    bullets.push({x:ship.x,y:ship.y-5,vy:-13,w:3,h:16,col:'#00ffff'});
    shootSnd();
  }
}

// Input
document.addEventListener('keydown',e=>{
  if(AC.state==='suspended')AC.resume();
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();if(STATE!=='play'){reset();return;}shoot();}
  if(STATE==='start')reset();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Touch controls
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  if(STATE!=='play'){reset();return;}
  touchX=e.touches[0].clientX;
  shoot();
},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();touchX=null;},{passive:false});

function update(dt){
  if(STATE!=='play')return;

  // Stars parallax
  stars.forEach(s=>{s.y+=s.z*dt*40;if(s.y>H)s.y=0;});

  // Ship move
  const spd=W*.55;
  if(keys['ArrowLeft']||keys['KeyA'])ship.vx-=spd*dt*3;
  if(keys['ArrowRight']||keys['KeyD'])ship.vx+=spd*dt*3;
  if(touchX!==null){
    const rect=C.getBoundingClientRect();
    const tx=(touchX-rect.left)*(W/rect.width);
    const diff=tx-ship.x;
    ship.vx=diff*8;
  }
  ship.vx*=.8;
  ship.x+=ship.vx;
  ship.x=Math.max(ship.w,Math.min(W-ship.w,ship.x));

  // Auto shoot on hold
  ship.shooting-=dt;
  if(ship.shooting<=0&&(keys['Space']||keys['KeyZ'])){shoot();ship.shooting=ship.rapid>0?.08:.18;}

  // Powerup timers
  if(ship.shield>0)ship.shield-=dt;
  if(ship.rapid>0)ship.rapid-=dt;
  if(iTimer>0)iTimer-=dt;
  if(comboTimer>0)comboTimer-=dt;else combo=0;
  if(shakeT>0)shakeT-=dt;

  // Bullets
  bullets.forEach(b=>{b.y+=b.vy;});
  bullets=bullets.filter(b=>b.y>-20);

  // Asteroids
  asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotV;if(a.x<-60)a.x=W+30;if(a.x>W+60)a.x=-30;});

  // Bullet-asteroid collision
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ai=asteroids.length-1;ai>=0;ai--){
      const a=asteroids[ai];
      if(Math.abs(b.x-a.x)<a.sz&&Math.abs(b.y-a.y)<a.sz){
        bullets.splice(bi,1);
        a.hp--;
        burst(b.x,b.y,6,['#ff6600','#ffaa00','#fff'],3);
        if(a.hp<=0){
          const pts=a.sz>30?80:a.sz>18?40:20;
          score+=pts*(1+combo);combo++;comboTimer=1.5;
          explodeSnd(a.sz);shakeT=.12;
          burst(a.x,a.y,a.sz>28?40:20,['#ff8800','#ffdd00','#ff4400','#fff'],a.sz>28?6:4);
          // Split large asteroids
          if(a.sz>28){
            for(let k=0;k<2;k++){
              const ns=a.sz*.52,ang=(Math.random()-.5)*2;
              asteroids.push(mkAsteroid(a.x+Math.cos(ang)*20,a.y+Math.sin(ang)*20,a.vx+Math.cos(ang)*2,a.vy+Math.sin(ang)*2,ns));
            }
          }
          // Powerup drop
          if(Math.random()<.12){
            const type=Math.random()<.5?'shield':'rapid';
            powerups.push({x:a.x,y:a.y,vy:1.2,type,life:8});
          }
          asteroids.splice(ai,1);
        }
        break;
      }
    }
  }

  // Powerup movement + pickup
  powerups.forEach(p=>p.y+=p.vy);
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(Math.abs(p.x-ship.x)<28&&Math.abs(p.y-ship.y)<28){
      if(p.type==='shield')ship.shield=8;else ship.rapid=6;
      powerSnd();burst(p.x,p.y,12,['#00ff88','#ffffff','#00ffcc'],4);
      powerups.splice(i,1);
    } else if(p.y>H+20)powerups.splice(i,1);
  }

  // Ship-asteroid collision
  if(iTimer<=0){
    for(const a of asteroids){
      const dx=ship.x-a.x,dy=ship.y-a.y;
      if(Math.hypot(dx,dy)<a.sz*.7+14){
        if(ship.shield>0){ship.shield=0;burst(ship.x,ship.y,20,['#00ff88','#ffffff'],5);shakeT=.2;iTimer=1.5;break;}
        lives--;iTimer=2;shakeT=.4;dieSnd();
        burst(ship.x,ship.y,40,['#ff4400','#ffdd00','#ffffff'],8);
        if(lives<=0){STATE='dead';if(score>best){best=score;localStorage.setItem('as_b',best);}}
        break;
      }
    }
  }

  // Asteroid-bottom → lose life
  for(let i=asteroids.length-1;i>=0;i--){
    if(asteroids[i].y>H+60){asteroids.splice(i,1);}
  }

  // Wave clear
  if(asteroids.length===0){wave++;waveTimer=1.5;spawnWave();}

  // Particles
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life-=p.dec;});
  parts=parts.filter(p=>p.life>0);
}

const glo=(fn,col,b=15)=>{ctx.save();ctx.shadowBlur=b;ctx.shadowColor=col;fn();ctx.restore();};

function drawShip(){
  if(iTimer>0&&Math.floor(iTimer*10)%2===0)return;
  const{x,y}=ship;
  // Thruster flame
  ctx.save();ctx.globalAlpha=.6+Math.random()*.3;
  const fl=ctx.createLinearGradient(x,y+14,x,y+14+18+Math.random()*8);
  fl.addColorStop(0,'rgba(0,150,255,.9)');fl.addColorStop(.5,'rgba(0,80,255,.5)');fl.addColorStop(1,'rgba(0,0,255,0)');
  ctx.fillStyle=fl;
  ctx.beginPath();ctx.moveTo(x-7,y+14);ctx.lineTo(x+7,y+14);ctx.lineTo(x+(Math.random()-0.5)*4,y+14+18+Math.random()*10);ctx.closePath();ctx.fill();
  ctx.restore();

  glo(()=>{
    ctx.fillStyle='#00ccff';
    ctx.beginPath();ctx.moveTo(x,y-14);ctx.lineTo(x+14,y+14);ctx.lineTo(x+6,y+8);ctx.lineTo(x,y+12);ctx.lineTo(x-6,y+8);ctx.lineTo(x-14,y+14);ctx.closePath();ctx.fill();
    // Cockpit
    ctx.fillStyle='rgba(0,255,255,.7)';ctx.beginPath();ctx.ellipse(x,y-2,5,8,0,0,Math.PI*2);ctx.fill();
    // Wings
    ctx.fillStyle='rgba(0,180,255,.7)';
    ctx.fillRect(x-18,y+6,6,8);ctx.fillRect(x+12,y+6,6,8);
  },'#00ccff',20);

  // Shield bubble
  if(ship.shield>0){
    const pulse=Math.sin(Date.now()/200)*.1;
    ctx.save();ctx.globalAlpha=.25+pulse;ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.shadowBlur=18;ctx.shadowColor='#00ff88';
    ctx.beginPath();ctx.arc(x,y,30,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function drawAsteroid(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
  const col=a.sz>30?'#cc6600':a.sz>18?'#997744':'#886633';
  glo(()=>{
    ctx.fillStyle=col;ctx.strokeStyle=a.hp>1?'#ffaa44':'#ff4400';ctx.lineWidth=1.5;
    ctx.beginPath();a.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fill();ctx.stroke();
    if(a.hp>1){ctx.fillStyle='rgba(255,80,0,.15)';ctx.beginPath();a.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fill();}
  },a.hp>1?'#ff4400':'#cc6600',8);
  ctx.restore();
}

function draw(){
  ctx.save();
  if(shakeT>0)ctx.translate((Math.random()-.5)*9*shakeT,(Math.random()-.5)*9*shakeT);

  // BG
  ctx.fillStyle='#000005';ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${.1+s.b*.45})`;ctx.fillRect(s.x,s.y,s.s,s.s);});

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  if(STATE==='play'||STATE==='dead'){
    // Powerups
    powerups.forEach(p=>{
      const col=p.type==='shield'?'#00ff88':'#ff9900';
      const t=Date.now()/500;
      glo(()=>{
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.fillStyle=`${col}33`;
        ctx.beginPath();ctx.arc(p.x,p.y,12+Math.sin(t)*.8*2,0,Math.PI*2);ctx.fill();ctx.stroke();
        ctx.fillStyle=col;ctx.font='14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(p.type==='shield'?'S':'R',p.x,p.y);
      },col,16);
    });

    // Asteroids
    asteroids.forEach(drawAsteroid);

    // Bullets
    bullets.forEach(b=>{
      glo(()=>{
        ctx.fillStyle=b.col;ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);
        ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(b.x-1,b.y,2,4);
      },b.col,14);
    });

    // Ship
    if(lives>0)drawShip();

    // Particles
    parts.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.shadowBlur=8;ctx.shadowColor=p.col;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();});

    // HUD
    ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.9)';ctx.font=`bold ${H*.038}px 'Orbitron',monospace`;
    glo(()=>{ctx.fillText(`${score}`,14,H*.046);},'#00ffff',12);
    ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=`${H*.026}px 'Orbitron',monospace`;
    ctx.fillText(`BEST ${best}`,W-14,H*.046);
    ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=`${H*.024}px 'Orbitron',monospace`;
    ctx.fillText(`WAVE ${wave}`,W/2,H*.046);

    // Lives
    for(let i=0;i<lives;i++){
      glo(()=>{ctx.fillStyle='#00ccff';ctx.beginPath();ctx.moveTo(14+i*22,H-.025*H);ctx.lineTo(22+i*22,H-.055*H);ctx.lineTo(30+i*22,H-.025*H);ctx.closePath();ctx.fill();},'#00ccff',8);
    }

    // Combo
    if(combo>1&&comboTimer>0){
      ctx.save();ctx.globalAlpha=Math.min(1,comboTimer);
      glo(()=>{ctx.fillStyle='#ffdd00';ctx.font=`bold ${H*.06}px 'Orbitron',monospace`;ctx.textAlign='center';ctx.fillText(`x${combo} COMBO`,W/2,H*.15);},'#ffdd00',18);
      ctx.restore();
    }

    // Power indicators
    if(ship.shield>0){glo(()=>{ctx.fillStyle='#00ff88';ctx.font=`${H*.026}px 'Orbitron',monospace`;ctx.textAlign='left';ctx.fillText(`SHIELD ${ship.shield.toFixed(1)}s`,14,H*.9);},'#00ff88',10);}
    if(ship.rapid>0){glo(()=>{ctx.fillStyle='#ff9900';ctx.font=`${H*.026}px 'Orbitron',monospace`;ctx.textAlign='right';ctx.fillText(`RAPID ${ship.rapid.toFixed(1)}s`,W-14,H*.9);},'#ff9900',10);}
  }

  // Scanline
  for(let y=0;y<H;y+=4){ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,y,W,1);}

  // Start screen
  if(STATE==='start'){
    ctx.textAlign='center';
    glo(()=>{ctx.fillStyle='#ff6600';ctx.font=`900 ${H*.09}px 'Orbitron',monospace`;ctx.fillText('ASTEROID',W/2,H*.33);},'#ff6600',30);
    glo(()=>{ctx.fillStyle='#ffdd00';ctx.font=`900 ${H*.09}px 'Orbitron',monospace`;ctx.fillText('STORM',W/2,H*.46);},'#ffdd00',30);
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.font=`${H*.03}px 'Orbitron',monospace`;
    ctx.fillText('SPACE · TAP TO START',W/2,H*.62);
    ctx.fillStyle='rgba(255,200,0,.3)';ctx.font=`${H*.022}px 'Orbitron',monospace`;
    ctx.fillText('arrows / touch to move',W/2,H*.7);
    ctx.fillText('space to shoot',W/2,H*.76);
  }

  // Dead screen
  if(STATE==='dead'){
    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    glo(()=>{ctx.fillStyle='#ff2244';ctx.font=`900 ${H*.09}px 'Orbitron',monospace`;ctx.fillText('GAME OVER',W/2,H*.38);},'#ff2244',28);
    ctx.fillStyle='#00ffff';ctx.font=`bold ${H*.05}px 'Orbitron',monospace`;ctx.fillText(`${score}`,W/2,H*.52);
    if(score===best&&score>0){glo(()=>{ctx.fillStyle='#ffdd00';ctx.font=`${H*.032}px 'Orbitron',monospace`;ctx.fillText('NEW RECORD',W/2,H*.61);},'#ffdd00',14);}
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=`${H*.028}px 'Orbitron',monospace`;ctx.fillText('TAP TO PLAY AGAIN',W/2,H*.78);
  }

  ctx.restore();
}

function loop(ts){const dt=Math.min((ts-last)/1e3,.05);last=ts;update(dt);draw();requestAnimationFrame(loop);}
mkStars();mkShip();
requestAnimationFrame(ts=>{last=ts;loop(ts);});
</script>
</body>
</html>
